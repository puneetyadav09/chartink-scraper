services:
  - type: web
    name: chartink-scraper
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      apt-get install -y chromium-driver || true
    startCommand: gunicorn app:app --workers 1 --threads 4 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DISPLAY
        value: ":99"